name: Refresh ticker data

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 06:00 UTC
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install requests pytickersymbols financedatabase

      - name: Run build script
        run: python scripts/build_tickers.py

      - name: Commit and push if changed
        run: |
          git diff --quiet data/tickers.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tickers.json
          git commit -m "Refresh ticker data (automated monthly)"
          git push
